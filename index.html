<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <section class="resault">
          <h2>Your Result</h2>

          <div class="circle">
            <h2>76</h2>
            <p>of 100</p>
          </div>
          <div class="description">
            <h2>Great</h2>
            <p>
              You scored higher than 65% of the people who have taken these
              tests.
            </p>
          </div>
        </section>

        <!--part 2 -->

        <section class="summary">
          <h2>Summary</h2>
          <div class="sum-content">
            <img src="./assets/images/icon-reaction.svg" alt="" />
            <p class="red">Reaction</p>
            <p><span>80</span> / 100</p>
          </div>
          <div class="sum-content">
            <img src="./assets/images/icon-memory.svg" alt="" />
            <p class="yellow">Memory</p>
            <p><span>92</span> / 100</p>
          </div>
          <div class="sum-content">
            <img src="./assets/images/icon-verbal.svg" alt="" />
            <p class="green">Verbal</p>
            <p><span>61</span> / 100</p>
          </div>
          <div class="sum-content">
            <img src="./assets/images/icon-visual.svg" alt="" />
            <p class="blue">Visual</p>
            <p><span>73</span> / 100</p>
          </div>
          <button type="button">Continue</button>
        </section>
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/iiwpkabderrahime">Abderrahime</a>.
    </footer>
  </body>
</html>
